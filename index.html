<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Lottery Tool</title>
    <style>
        :root { --primary: #4a90e2; --danger: #e74c3c; --text: #2c3e50; --bg: #f8f9fa; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 800px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); padding: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; padding: 20px; } }
        h1 { grid-column: 1 / -1; text-align: center; margin: 0 0 20px; font-weight: 700; color: var(--primary); }
        h2 { font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; color: #95a5a6; margin-bottom: 15px; border: none; }
        
        textarea, input, select { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-family: inherit; box-sizing: border-box; transition: border 0.2s; outline: none; }
        textarea:focus, input:focus { border-color: var(--primary); }
        textarea { height: 140px; resize: vertical; margin-bottom: 15px; }
        
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; width: 100%; }
        button:hover { opacity: 0.9; }
        .btn-primary { background: var(--primary); color: white; font-size: 1.1rem; margin-top: 10px; }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); margin-top: 10px; }
        .btn-sm { padding: 8px 12px; font-size: 0.8rem; width: auto; background: #ecf0f1; color: var(--text); }
        .btn-save { background: #2ecc71; color: white; }
        .btn-del { background: #ffebee; color: var(--danger); margin-left: 5px; }

        .quick-section { margin-top: 20px; padding-top: 20px; border-top: 1px dashed #eee; }
        .quick-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
        .quick-row input, .quick-row select { margin: 0; width: 80px; }
        .saved-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .saved-tag { display: flex; align-items: center; background: #f1f3f5; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; animation: fadeIn 0.3s; }
        .saved-tag span { cursor: pointer; margin-right: 8px; }
        .saved-tag .del-icon { color: #bdc3c7; font-weight: bold; cursor: pointer; }
        .saved-tag .del-icon:hover { color: var(--danger); }

        .result-area { min-height: 80px; margin-bottom: 30px; }
        .result-item { background: #f0f7ff; color: var(--primary); padding: 12px; border-radius: 8px; margin-bottom: 8px; font-weight: 600; text-align: center; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .history-list { list-style: none; padding: 0; max-height: 250px; overflow-y: auto; }
        .history-item { padding: 10px 0; border-bottom: 1px solid #f5f5f5; font-size: 0.9rem; }
        .history-time { color: #bdc3c7; font-size: 0.75rem; margin-bottom: 2px; }
        .error-msg { color: var(--danger); font-size: 0.85rem; margin-top: 8px; display: none; text-align: center; }

        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🎲 Random Lottery</h1>

    <!-- Left: Input & Controls -->
    <div>
        <h2>Participant List</h2>
        <textarea id="namesInput" placeholder="Paste names here (one per line or comma separated)..."></textarea>
        
        <div class="quick-section">
            <h2>Quick Generate</h2>
            <div class="quick-row">
                <button class="btn-sm" onclick="generateNumberList()">1-N</button>
                <input type="number" id="numRangeN" value="50" min="1">
                <button class="btn-sm" onclick="generateLetterList()">A-Z</button>
                <select id="letterRangeEnd"><option value="Z">A-Z</option><option value="J">A-J</option></select>
            </div>
            
            <!-- NEW: Save Custom List Feature -->
            <div style="display:flex; gap:8px; margin-top:10px;">
                <input type="text" id="customListName" placeholder="List name (e.g. Class A)" style="flex:1;">
                <button class="btn-sm btn-save" onclick="saveCustomList()">💾 Save</button>
            </div>
            <div id="savedListsContainer" class="saved-list"></div>
        </div>

        <h2 style="margin-top:25px;">Draw Settings</h2>
        <div class="quick-row">
            <span style="white-space:nowrap; font-size:0.9rem;">Winners:</span>
            <input type="number" id="drawCount" value="1" min="1">
        </div>
        <button class="btn-primary" onclick="performDraw()">DRAW NOW</button>
        <button class="btn-danger" onclick="clearHistory()">Clear History</button>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <!-- Right: Results & History -->
    <div>
        <h2>Current Result</h2>
        <div id="result-area" class="result-area">
            <p style="color:#ccc; text-align:center; margin-top:20px;">Ready to draw...</p>
        </div>

        <h2>History Log</h2>
        <ul id="historyList" class="history-list"></ul>
    </div>
</div>

<script>
    // --- Core Logic ---
    function parseNames() {
        const raw = document.getElementById('namesInput').value;
        return raw ? raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean) : [];
    }

    function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function performDraw() {
        const names = parseNames();
        const count = parseInt(document.getElementById('drawCount').value);
        const err = document.getElementById('errorMsg');
        const resArea = document.getElementById('result-area');
        
        err.style.display = 'none';
        if (!names.length) { err.textContent = "Please enter participants."; err.style.display = 'block'; return; }
        if (count <= 0 || count > names.length) { err.textContent = `Invalid count (Max: ${names.length})`; err.style.display = 'block'; return; }

        const winners = shuffleArray(names).slice(0, count);
        resArea.innerHTML = winners.map(w => `<div class="result-item">${w}</div>`).join('');
        
        const li = document.createElement('li');
        li.className = 'history-item';
        li.innerHTML = `<div class="history-time">${new Date().toLocaleTimeString()}</div><div>${winners.join(', ')}</div>`;
        document.getElementById('historyList').prepend(li);
    }

    function clearHistory() {
        document.getElementById('historyList').innerHTML = '';
        document.getElementById('result-area').innerHTML = '<p style="color:#ccc; text-align:center; margin-top:20px;">History cleared.</p>';
    }

    function generateNumberList() {
        const n = parseInt(document.getElementById('numRangeN').value);
        if (n > 0) document.getElementById('namesInput').value = Array.from({length: n}, (_, i) => i + 1).join('\n');
    }

    function generateLetterList() {
        const end = document.getElementById('letterRangeEnd').value.charCodeAt(0);
        let arr = [];
        for (let i = 65; i <= end; i++) arr.push(String.fromCharCode(i));
        document.getElementById('namesInput').value = arr.join('\n');
    }

    // --- NEW: Custom Saved Lists Logic ---
    const STORAGE_KEY = 'lottery_saved_lists';
    
    function getSavedLists() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
    }

    function renderSavedLists() {
        const lists = getSavedLists();
        const container = document.getElementById('savedListsContainer');
        container.innerHTML = '';
        Object.entries(lists).forEach(([name, dataStr]) => {
            const tag = document.createElement('div');
            tag.className = 'saved-tag';
            tag.innerHTML = `<span onclick="loadCustomList('${name}')">${name}</span><span class="del-icon" onclick="deleteCustomList('${name}')" title="Delete">×</span>`;
            container.appendChild(tag);
        });
    }

    function saveCustomList() {
        const nameInput = document.getElementById('customListName');
        const name = nameInput.value.trim();
        const data = document.getElementById('namesInput').value.trim();
        
        if (!name) { alert("Please enter a list name."); return; }
        if (!data) { alert("Participant list is empty."); return; }
        
        const lists = getSavedLists();
        lists[name] = data;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(lists));
        nameInput.value = '';
        renderSavedLists();
    }

    function loadCustomList(name) {
        const lists = getSavedLists();
        if (lists[name]) document.getElementById('namesInput').value = lists[name];
    }

    function deleteCustomList(name) {
        if (!confirm(`Delete "${name}"?`)) return;
        const lists = getSavedLists();
        delete lists[name];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(lists));
        renderSavedLists();
    }

    // Initialize saved lists on load
    renderSavedLists();
</script>
</body>
</html>
